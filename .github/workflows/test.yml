name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio aioresponses aiohttp ruff mypy
          pip install pytest-homeassistant-custom-component

      - name: Lint with ruff
        run: ruff check custom_components/ tests/

      - name: Type check with mypy
        run: mypy custom_components/

      - name: Run tests
        run: pytest -v
